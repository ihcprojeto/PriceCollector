    sdk: flutter
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0
  flutter_lints: 4.0.0
  lints: 4.0.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/icone.png"
